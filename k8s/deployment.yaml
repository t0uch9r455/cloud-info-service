apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-info-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloud-info-service
  template:
    metadata:
      labels:
        app: cloud-info-service
    spec:
      serviceAccountName: cloud-info-sa    
      securityContext: 
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: app
        image: "{{ .Values.image }}" 
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: cloud-info-config
        - secretRef:
            name: cloud-info-secret
        env:
        - name: GIT_COMMIT
          value: "COMMIT_SHA_PLACEHOLDER"   
        - name: BUILD_TIME
          value: "BUILD_TIME_PLACEHOLDER"   
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        emptyDir: {}
